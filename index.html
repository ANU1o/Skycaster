<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#444054" />
    <meta property="og.title" content="Skycaster" />
    <meta property="og:description" content="Made by Anoof Abdul Kadar" />
    <title>Skycaster</title>
    <link
      rel="shortcut icon"
      href="./assets/images/Skycaster.ico"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <script
      src="https://kit.fontawesome.com/38647df40d.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="user-select-none">
    <aside class="py-5 d-lg-grid">
      <div class="input-group h-25 mb-auto">
        <input
          type="text"
          name="pname"
          id="pname"
          placeholder="Enter Location Name"
          class="form-control"
        />
        <button class="btn btn-primary" type="button" onclick="searchData()">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
      <ul class="nav nav-pills flex-column mt-auto mb-auto" id="snav">
        <li class="nav-item">
          <a href="#Home" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="#Precipitation" class="nav-link">Precipitation</a>
        </li>
        <li class="nav-item"><a href="#Wind" class="nav-link">Wind</a></li>
      </ul>
      <div class="mt-auto">
        <h4 class="text-center text-primary-alt">
          <i class="fa-solid fa-rainbow text-main fa-3x"></i><br />Skycaster
        </h4>
        <p class="text-primary text-center by">Made by Anoof Abdul Kadar</p>
      </div>
    </aside>

    <nav class="d-lg-none d-sm-block fixed-bottom navbar bg-secondary-alt">
      <ul class="nav me-5">
        <li class="nav-item">
          <a href="#Precipitation" class="nav-link">Precipitation</a>
        </li>
      </ul>
      <a href="#Home" class="btn btn-primary btn-lg home shadow-lg" title="Home"
        ><i class="fa-solid fa-rainbow"></i
      ></a>
      <ul class="nav ms-auto">
        <li class="nav-item"><a href="#Wind" class="nav-link">Wind</a></li>
      </ul>
    </nav>

    <div class="fixed-top d-lg-none d-sm-block m-3">
      <div class="input-group">
        <input
          type="text"
          name="pmname"
          id="pmname"
          placeholder="Enter Location Name"
          class="form-control"
        />
        <button class="btn btn-primary" type="button" onclick="searchMData()">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </div>

    <div class="m-5 fixed-bottom" id="searchAlert"></div>

    <main data-bs-spy="scroll" data-bs-target="#snav">
      <div
        id="Home"
        class="d-flex bg-secondary-alt justify-content-center align-items-center rounded p-3 mb-3"
        style="height: 90vh"
      >
        <div class="bg-day-secondary rounded p-5" id="conthome">
          <div class="row align-items-center">
            <div class="col-12 mb-5 text-light text-center">
              <br /><span id="weatherDetresult"></span>
            </div>
            <div class="col-lg col-sm-12 mb-3">
              <h2 class="text-day text-center">
                <i class="fa-solid fa-temperature-half"></i>
                <span id="tempresult">0</span>°C
              </h2>
            </div>
            <div class="col-lg col-sm-12 mb-3">
              <h2 class="text-day text-center">
                <i class="fa-solid fa-droplet"></i>
                <span id="humdresult">0</span>%
              </h2>
            </div>
            <div class="col-lg col-sm-12 mb-3">
              <h2 class="text-day text-center">
                <i class="fa-solid fa-wind"></i>
                <span id="speedWind">0</span> km/h
              </h2>
            </div>
            <div class="col-12">
              <small class="d-block text-center text-day"
                ><i class="fa-solid fa-globe"></i><br />
                <span class="text-light fw-bold" id="placeName">none</span
                ><br />[<span id="cV">0</span>, <span id="cH">0</span>] <br />
                <span id="timeRes"></span>
              </small>
            </div>
          </div>
        </div>
      </div>

      <div id="Precipitation" class="bg-secondary-alt mb-3 rounded p-3">
        <h1 class="display-4 text-center text-uppercase my-5">Precipitation</h1>
        <div class="row gap-2">
          <div class="col-lg col-sm-12">
            <div class="bg-secondary-alt-2 rounded p-5">
              <h5 class="text-center">
                <i class="fa-solid fa-smog"></i> Pressure
              </h5>
              <h2 class="text-center text-main display-1">
                <span id="presult">0</span> mbar
              </h2>
            </div>
          </div>
          <div class="col-lg col-sm-12">
            <div class="bg-secondary-alt-2 rounded p-5">
              <h5 class="text-center">
                <i class="fa-solid fa-droplet"></i> Humidity
              </h5>
              <h2 class="text-center text-main display-1">
                <span id="hum">0</span>%
              </h2>
            </div>
          </div>
        </div>
      </div>
      <div id="Wind" class="bg-secondary-alt mb-3 rounded p-3">
        <h1 class="display-4 text-center text-uppercase my-5">Wind</h1>
        <div class="row gap-2">
          <div class="col-lg col-sm-12">
            <div class="bg-secondary-alt-2 rounded p-5">
              <h5 class="text-center">
                <i class="fa-solid fa-gauge"></i> Speed
              </h5>
              <h2 class="text-center text-main display-1">
                <span id="ws">0</span> km/h
              </h2>
            </div>
          </div>
          <div class="col-lg col-sm-12">
            <div class="bg-secondary-alt-2 rounded p-5">
              <h5 class="text-center">
                <i class="fa-solid fa-compass"></i> Direction
              </h5>
              <h2 class="text-center text-main display-1">
                <span id="wd">0</span>°
              </h2>
            </div>
          </div>
        </div>
      </div>

      <div class="d-sm-block d-lg-none">
        <hr />
        <h4 class="text-center text-secondary-alt">
          <i class="fa-solid fa-rainbow fa-3x"></i><br />Skycaster
        </h4>
        <p class="text-secondary-alt text-center by">
          Made by Anoof Abdul Kadar
        </p>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
  <script>
    searchData = () => {
      place = pname.value;
      fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${place}&appid=b41ec3be35c7dac8aabbc21ba253137a`
      )
        .then((data) => data.json())
        .then((data) => displayData(data))

        .catch((error) => {
          searchAlert.innerHTML = `<div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-exclamation"></i> Enter A valid location!!!
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>`;
        });

      displayData = (data) => {
        tempresult.innerHTML = (data.main.temp - 273.15).toFixed(2);
        humdresult.innerHTML = data.main.humidity;
        speedWind.innerHTML = data.wind.speed;
        placeName.innerHTML = data.name;
        cV.innerHTML = data.coord.lon;
        cH.innerHTML = data.coord.lat;
        presult.innerHTML = data.main.pressure;
        hum.innerHTML = data.main.humidity;
        ws.innerHTML = data.wind.speed;
        wd.innerHTML = data.wind.deg;
        timeRes.innerHTML = new Date(data.dt * 1000 + data.timezone * 1000);
        weatherIcon = data.weather[0].icon;
        weatherDetresult.innerHTML = `<img src="https://openweathermap.org/img/wn/${weatherIcon}@2x.png" ><br><span class="fw-bold fs-4">${data.weather[0].main}</span>`;
        if (weatherIcon.charAt(weatherIcon.length - 1) == "d") {
          Home.classList.remove("bg-secondary-alt");
          Home.classList.remove("bg-nightImg");
          conthome.classList.remove("bg-night-secondary");
          Home.classList.add("bg-dayImg");
          conthome.classList.add("bg-day-secondary");
        } else if (weatherIcon.charAt(weatherIcon.length - 1) == "n") {
          Home.classList.remove("bg-secondary-alt");
          Home.classList.remove("bg-dayImg");
          conthome.classList.remove("bg-day-secondary");
          Home.classList.add("bg-nightImg");
          conthome.classList.add("bg-night-secondary");
        }
      };
    };

    searchMData = () => {
      place = pmname.value;
      fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${place}&appid=b41ec3be35c7dac8aabbc21ba253137a`
      )
        .then((data) => data.json())
        .then((data) => displayData(data));

      displayData = (data) => {
        tempresult.innerHTML = (data.main.temp - 273.15).toFixed(2);
        humdresult.innerHTML = data.main.humidity;
        speedWind.innerHTML = data.wind.speed;
        placeName.innerHTML = data.name;
        cV.innerHTML = data.coord.lon;
        cH.innerHTML = data.coord.lat;
        presult.innerHTML = data.main.pressure;
        hum.innerHTML = data.main.humidity;
        ws.innerHTML = data.wind.speed;
        wd.innerHTML = data.wind.deg;
        timeRes.innerHTML = new Date(data.dt * 1000 + data.timezone * 1000);
        weatherDetresult.innerHTML = `<img src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png" ><br><span class="fw-bold fs-4">${data.weather[0].main}</span>`;
        if (weatherIcon.charAt(weatherIcon.length - 1) == "d") {
          Home.classList.remove("bg-secondary-alt");
          Home.classList.add("bg-dayImg");
          conthome.classList.add("bg-day-secondary");
        } else if (weatherIcon.charAt(weatherIcon.length - 1) == "n") {
          Home.classList.remove("bg-secondary-alt");
          Home.classList.add("bg-nightImg");
          conthome.classList.add("bg-night-secondary");
        }
      };
    };
  </script>
</html>
